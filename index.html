<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RABI3 AI | OpenRouter</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0f1a, #03060c);
            font-family: 'Cairo', sans-serif;
            color: #eef5ff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .chat-container {
            width: 100%;
            max-width: 800px;
            background: rgba(10, 20, 40, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid cyan;
            box-shadow: 0 0 30px rgba(0,255,255,0.2);
            overflow: hidden;
        }
        .chat-header {
            background: linear-gradient(90deg, #0a1a2a, #1a0033);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid magenta;
        }
        .chat-header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #fff, #0ff, #f0f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .chat-header p {
            font-size: 0.8rem;
            color: #88aaff;
            margin-top: 5px;
        }
        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }
        .social-links a {
            color: #0ff;
            font-size: 1.3rem;
            transition: 0.3s;
        }
        .social-links a:hover {
            color: magenta;
            transform: translateY(-3px);
        }
        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 20px;
            word-break: break-word;
        }
        .user-message {
            background: #2a1a4a;
            align-self: flex-end;
            border-right: 3px solid magenta;
        }
        .ai-message {
            background: #1a1a2a;
            align-self: flex-start;
            border-left: 3px solid cyan;
        }
        .typing {
            background: #1a1a2a;
            align-self: flex-start;
            padding: 10px 15px;
            border-radius: 20px;
            border-left: 3px solid cyan;
            font-style: italic;
            color: #aaa;
        }
        .chat-input {
            display: flex;
            padding: 15px;
            gap: 10px;
            border-top: 1px solid magenta;
            background: rgba(0,0,0,0.3);
        }
        .chat-input input {
            flex: 1;
            background: #0a1a2a;
            border: 1px solid cyan;
            border-radius: 60px;
            padding: 12px 18px;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        .chat-input input:focus {
            border-color: magenta;
        }
        .chat-input button {
            background: magenta;
            border: none;
            border-radius: 60px;
            padding: 12px 24px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .chat-input button:hover {
            background: cyan;
            color: black;
        }
        .footer {
            text-align: center;
            padding: 12px;
            font-size: 0.7rem;
            color: #6c8f8c;
            border-top: 1px solid rgba(0,255,255,0.2);
        }
        @media (max-width: 600px) {
            .chat-messages { height: 350px; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <h1>🧠 RABI3 AI | OpenRouter</h1>
        <p>ذكاء اصطناعي خارق - اسألني أي شيء</p>
        <div class="social-links">
            <a href="https://www.facebook.com/HACR97" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.instagram.com/real_rabi31" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://t.me/rabi3_prof12" target="_blank"><i class="fab fa-telegram-plane"></i></a>
        </div>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="message ai-message">🤖 مرحباً! أنا RABI3 AI، ذكاء اصطناعي خارق يعمل عبر OpenRouter. اسألني أي شيء وسأجيبك فوراً!</div>
        <div class="message ai-message">🔗 روابط RABI3: فيسبوك، انستقرام، تليجرام (موجودة في الأعلى)</div>
    </div>

    <div class="chat-input">
        <input type="text" id="userInput" placeholder="اكتب سؤالك هنا...">
        <button id="sendBtn"><i class="fas fa-paper-plane"></i> إرسال</button>
    </div>

    <div class="footer">
        © RABI3 PROF12 | يعمل بتقنية OpenRouter AI
    </div>
</div>

<script>
    // =====================================================
    // مفتاح OpenRouter API (خاص بك)
    // =====================================================
    const OPENROUTER_API_KEY = "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";
    const OPENROUTER_URL = "https://openrouter.ai/api/v1/chat/completions";

    // عناصر الصفحة
    const chatMessages = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    let isWaiting = false;

    // إضافة رسالة إلى الشات
    function addMessage(text, isUser = false) {
        const messageDiv = document.createElement('div');
        messageDiv.className = isUser ? 'message user-message' : 'message ai-message';
        messageDiv.innerHTML = isUser ? `👤 ${text}` : `🤖 ${text}`;
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // إظهار مؤشر الكتابة
    function showTyping() {
        const typingDiv = document.createElement('div');
        typingDiv.className = 'typing';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = '🤖 جاري التفكير...';
        chatMessages.appendChild(typingDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function hideTyping() {
        const typing = document.getElementById('typingIndicator');
        if (typing) typing.remove();
    }

    // الاتصال بـ OpenRouter API
    async function callOpenRouter(userMessage) {
        try {
            const response = await fetch(OPENROUTER_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${OPENROUTER_API_KEY}`,
                    'HTTP-Referer': window.location.href,
                    'X-Title': 'RABI3 AI'
                },
                body: JSON.stringify({
                    model: "mistralai/mistral-7b-instruct:free",
                    messages: [
                        {
                            role: "system",
                            content: "أنت RABI3 AI، ذكاء اصطناعي خارق. أنت ودود، ذكي، وتساعد المستخدمين. ترد باللغة العربية أو الإنجليزية حسب لغة المستخدم. إجاباتك مختصرة ومفيدة."
                        },
                        { role: "user", content: userMessage }
                    ],
                    temperature: 0.7,
                    max_tokens: 500
                })
            });

            const data = await response.json();
            if (data.choices && data.choices[0]) {
                return data.choices[0].message.content;
            } else {
                console.error("API Error:", data);
                return "عذراً، حدث خطأ في الذكاء الاصطناعي. حاول مرة أخرى.";
            }
        } catch(error) {
            console.error("Network Error:", error);
            return "❌ خطأ في الاتصال بخادم الذكاء الاصطناعي. تأكد من اتصالك بالإنترنت.";
        }
    }

    // إرسال الرسالة
    async function sendMessage() {
        const message = userInput.value.trim();
        if (!message || isWaiting) return;

        // إضافة رسالة المستخدم
        addMessage(message, true);
        userInput.value = '';
        isWaiting = true;
        showTyping();

        // الاتصال بـ OpenRouter
        const reply = await callOpenRouter(message);

        hideTyping();
        addMessage(reply, false);
        isWaiting = false;
    }

    // إرسال عند الضغط على الزر أو Enter
    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // رسالة ترحيب في وحدة التحكم
    console.log("%c🧠 RABI3 AI | OpenRouter API - جاهز!", "color: cyan; font-size: 14px");
    console.log("%c🔑 المفتاح: " + OPENROUTER_API_KEY.substring(0, 20) + "...", "color: magenta");
</script>
</body>
</html>
