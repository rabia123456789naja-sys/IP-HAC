<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RABI3 AI PRO | الذكاء الخارق</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --c: #00ffff;
  --m: #ff00ff;
  --g: #00ff88;
  --y: #ffee00;
  --dark: #020510;
  --dark2: #060d1f;
  --dark3: #0a1428;
  --glass: rgba(0,255,255,0.04);
  --glass2: rgba(0,255,255,0.08);
  --border: rgba(0,255,255,0.2);
  --border2: rgba(0,255,255,0.4);
}

*{margin:0;padding:0;box-sizing:border-box}

::selection{background:#00ffff33;color:#fff}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#020510}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--c),var(--m));border-radius:4px}

body {
  background: var(--dark);
  font-family: 'Cairo', sans-serif;
  color: #d0e8ff;
  min-height: 100vh;
  overflow-x: hidden;
  cursor: crosshair;
}

/* ── CANVAS BACKGROUND ── */
#bgCanvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ── SCAN LINE OVERLAY ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
  pointer-events: none;
  z-index: 1;
}

/* ── NOISE GRAIN ── */
body::before {
  content: '';
  position: fixed;
  inset: -50%;
  width: 200%;
  height: 200%;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1;
  opacity: 0.4;
  animation: grain 0.5s steps(1) infinite;
}
@keyframes grain {
  0%,100%{transform:translate(0,0)}10%{transform:translate(-2%,-2%)}20%{transform:translate(2%,1%)}30%{transform:translate(-1%,2%)}40%{transform:translate(1%,-1%)}50%{transform:translate(-2%,2%)}60%{transform:translate(2%,-2%)}70%{transform:translate(-1%,1%)}80%{transform:translate(1%,2%)}90%{transform:translate(-2%,-1%)}
}

/* ── LAYOUT ── */
.wrap {
  position: relative;
  z-index: 2;
  max-width: 1100px;
  margin: 0 auto;
  padding: 20px 16px 100px;
}

/* ── HEADER ── */
.header {
  text-align: center;
  padding: 30px 20px 24px;
  margin-bottom: 30px;
  position: relative;
}

.header-inner {
  background: var(--glass);
  backdrop-filter: blur(30px);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 28px 30px 22px;
  position: relative;
  overflow: hidden;
}

.header-inner::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--c), var(--m), transparent);
  animation: scanH 3s linear infinite;
}
.header-inner::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(0,255,255,0.08), transparent 70%);
}
@keyframes scanH {
  0%{opacity:1} 50%{opacity:0.3} 100%{opacity:1}
}

.logo-tag {
  font-family: 'Orbitron', monospace;
  font-size: 0.65rem;
  color: var(--c);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 10px;
  opacity: 0.7;
}

.logo-main {
  font-family: 'Orbitron', monospace;
  font-size: clamp(1.8rem, 5vw, 3rem);
  font-weight: 900;
  line-height: 1;
  background: linear-gradient(135deg, #fff 0%, var(--c) 40%, var(--m) 70%, #fff 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: none;
  position: relative;
  z-index: 1;
  animation: glitch 6s infinite;
}

@keyframes glitch {
  0%,90%,100%{filter:none;transform:none}
  91%{filter:hue-rotate(90deg);transform:translateX(-2px)}
  92%{filter:hue-rotate(180deg);transform:translateX(2px)}
  93%{filter:none;transform:none}
  96%{filter:hue-rotate(270deg);transform:translateX(-1px)}
  97%{filter:none;transform:none}
}

.logo-sub {
  font-size: 0.75rem;
  color: rgba(170,220,255,0.6);
  margin-top: 8px;
  letter-spacing: 2px;
  position: relative;
  z-index: 1;
}

.status-bar {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 16px;
  flex-wrap: wrap;
  position: relative;
  z-index: 1;
}

.status-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.7rem;
  color: rgba(0,255,255,0.7);
  font-family: 'Orbitron', monospace;
}

.pulse-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--g);
  box-shadow: 0 0 8px var(--g);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:0.4;transform:scale(0.7)}
}

.socials {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 18px;
  position: relative;
  z-index: 1;
}

.social-btn {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: var(--glass2);
  border: 1px solid var(--border);
  display: grid;
  place-items: center;
  color: var(--c);
  font-size: 1rem;
  text-decoration: none;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}
.social-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--c), var(--m));
  opacity: 0;
  transition: opacity 0.3s;
}
.social-btn:hover::before { opacity: 0.15; }
.social-btn:hover { border-color: var(--m); color: var(--m); transform: translateY(-3px); box-shadow: 0 8px 20px rgba(255,0,255,0.2); }
.social-btn i { position: relative; z-index: 1; }

/* ── SECTION TITLE ── */
.section-title {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  font-family: 'Orbitron', monospace;
  font-size: 0.8rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--c);
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--border2), transparent);
}
.section-title .icon-box {
  width: 34px; height: 34px;
  border-radius: 10px;
  background: rgba(0,255,255,0.1);
  border: 1px solid var(--border2);
  display: grid;
  place-items: center;
  font-size: 0.9rem;
}

/* ── CARD ── */
.card {
  background: var(--glass);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 22px;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--c) 30%, var(--m) 70%, transparent 100%);
  opacity: 0.5;
}
.card:hover {
  border-color: rgba(0,255,255,0.35);
  box-shadow: 0 0 40px rgba(0,255,255,0.06), inset 0 0 30px rgba(0,255,255,0.02);
}

/* ── INPUT ── */
.neo-input {
  background: rgba(0,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  color: #e0f4ff;
  font-family: 'Cairo', sans-serif;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.3s, box-shadow 0.3s;
  width: 100%;
}
.neo-input:focus {
  border-color: var(--c);
  box-shadow: 0 0 0 3px rgba(0,255,255,0.08), inset 0 0 10px rgba(0,255,255,0.03);
}
.neo-input::placeholder { color: rgba(150,200,255,0.35); }

/* ── BUTTON ── */
.neo-btn {
  background: linear-gradient(135deg, rgba(0,255,255,0.15), rgba(0,100,255,0.15));
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 11px 22px;
  color: var(--c);
  font-family: 'Cairo', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.3s;
  white-space: nowrap;
  position: relative;
  overflow: hidden;
}
.neo-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--c), var(--m));
  opacity: 0;
  transition: opacity 0.3s;
}
.neo-btn:hover::before { opacity: 0.12; }
.neo-btn:hover { border-color: var(--c); box-shadow: 0 0 20px rgba(0,255,255,0.2); transform: translateY(-1px); }
.neo-btn:active { transform: translateY(0); }
.neo-btn span { position: relative; z-index: 1; }
.neo-btn.m { border-color: rgba(255,0,255,0.4); color: var(--m); }
.neo-btn.m:hover { border-color: var(--m); box-shadow: 0 0 20px rgba(255,0,255,0.2); }

/* ── IP TRACKER ── */
.ip-row { display: flex; gap: 10px; }
.ip-row .neo-input { flex: 1; }

.result-panel {
  margin-top: 18px;
  display: none;
  animation: fadeIn 0.4s ease;
}
.result-panel.show { display: block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
  margin-bottom: 14px;
}

.info-tile {
  background: rgba(0,255,255,0.04);
  border: 1px solid rgba(0,255,255,0.12);
  border-radius: 14px;
  padding: 12px 14px;
  transition: all 0.3s;
}
.info-tile:hover { border-color: var(--border2); background: rgba(0,255,255,0.07); }
.info-tile .lbl {
  font-size: 0.6rem;
  color: rgba(0,255,255,0.5);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-family: 'Orbitron', monospace;
  margin-bottom: 5px;
}
.info-tile .val {
  font-size: 0.85rem;
  font-weight: 700;
  color: #e0f4ff;
}

.map-wrap {
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid rgba(255,0,0,0.3);
  height: 260px;
  box-shadow: 0 0 30px rgba(255,0,0,0.08), inset 0 0 20px rgba(0,0,0,0.5);
}

.warning-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,80,80,0.08);
  border: 1px solid rgba(255,80,80,0.2);
  border-radius: 8px;
  padding: 5px 12px;
  font-size: 0.65rem;
  color: rgba(255,130,130,0.8);
  margin-top: 12px;
}

/* ── TRANSLATOR ── */
.translate-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
@media(max-width:600px){ .translate-grid{grid-template-columns:1fr} }

.translate-pane {
  background: rgba(0,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
}
.translate-pane label {
  font-size: 0.65rem;
  color: rgba(0,255,255,0.5);
  letter-spacing: 2px;
  font-family: 'Orbitron', monospace;
  display: block;
  margin-bottom: 8px;
  text-transform: uppercase;
}
.translate-pane textarea {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: #d0e8ff;
  font-family: 'Cairo', sans-serif;
  font-size: 0.9rem;
  resize: none;
  min-height: 90px;
}
.translate-pane textarea::placeholder { color: rgba(150,200,255,0.25); }

.translate-result-pane {
  background: rgba(0,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  min-height: 120px;
  font-size: 0.9rem;
  color: rgba(200,240,255,0.8);
  line-height: 1.7;
}
.translate-result-pane .placeholder { color: rgba(150,200,255,0.25); font-style: italic; }

.translate-actions { display: flex; gap: 10px; justify-content: center; margin: 14px 0; flex-wrap: wrap; }

/* ── AI FLOATING BUTTON ── */
.ai-fab {
  position: fixed;
  bottom: 24px;
  left: 24px;
  width: 62px; height: 62px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #2a0050, #0a001a);
  border: 2px solid var(--m);
  box-shadow: 0 0 25px rgba(255,0,255,0.4), 0 0 60px rgba(255,0,255,0.1);
  cursor: pointer;
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.6rem;
  color: var(--m);
  transition: all 0.3s;
  animation: fabPulse 3s ease-in-out infinite;
}
@keyframes fabPulse {
  0%,100%{box-shadow:0 0 25px rgba(255,0,255,0.4),0 0 60px rgba(255,0,255,0.1)}
  50%{box-shadow:0 0 35px rgba(255,0,255,0.6),0 0 80px rgba(255,0,255,0.2)}
}
.ai-fab:hover { transform: scale(1.1) rotate(10deg); border-color: var(--c); color: var(--c); }
.ai-fab .notif {
  position: absolute;
  top: 2px; right: 2px;
  width: 12px; height: 12px;
  background: var(--g);
  border-radius: 50%;
  border: 2px solid var(--dark);
  box-shadow: 0 0 8px var(--g);
}

/* ── AI WINDOW ── */
.ai-win {
  position: fixed;
  bottom: 100px;
  left: 24px;
  width: 360px;
  height: 500px;
  background: rgba(6,10,24,0.97);
  backdrop-filter: blur(30px);
  border-radius: 22px;
  border: 1px solid rgba(255,0,255,0.3);
  z-index: 9998;
  display: none;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 0 60px rgba(255,0,255,0.15), 0 30px 60px rgba(0,0,0,0.6);
  animation: winIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes winIn {
  from{opacity:0;transform:translateY(20px) scale(0.95)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

.ai-win-header {
  background: linear-gradient(135deg, rgba(40,0,70,0.9), rgba(0,10,40,0.9));
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(255,0,255,0.2);
  cursor: move;
  user-select: none;
  flex-shrink: 0;
}
.ai-win-header::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--m), var(--c), transparent);
}

.ai-win-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'Orbitron', monospace;
  font-size: 0.75rem;
  color: var(--m);
  letter-spacing: 2px;
}
.ai-win-title .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--g); box-shadow: 0 0 8px var(--g); animation: pulse 2s infinite; }

.ai-win-close {
  width: 26px; height: 26px;
  border-radius: 8px;
  background: rgba(255,0,255,0.1);
  border: 1px solid rgba(255,0,255,0.2);
  color: rgba(255,0,255,0.7);
  cursor: pointer;
  display: grid;
  place-items: center;
  font-size: 0.9rem;
  transition: all 0.2s;
}
.ai-win-close:hover { background: rgba(255,0,255,0.2); color: var(--m); }

.ai-messages {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.ai-messages::-webkit-scrollbar { width: 3px; }
.ai-messages::-webkit-scrollbar-thumb { background: rgba(255,0,255,0.3); }

.msg-ai, .msg-user {
  max-width: 85%;
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 0.83rem;
  line-height: 1.6;
  animation: fadeIn 0.25s ease;
}
.msg-ai {
  background: rgba(0,255,255,0.06);
  border: 1px solid rgba(0,255,255,0.12);
  border-bottom-left-radius: 4px;
  align-self: flex-start;
  color: #c8e8ff;
}
.msg-user {
  background: rgba(255,0,255,0.08);
  border: 1px solid rgba(255,0,255,0.15);
  border-bottom-right-radius: 4px;
  align-self: flex-end;
  text-align: right;
  color: #f0d0ff;
}

.typing-ind {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 10px 14px;
  background: rgba(0,255,255,0.04);
  border: 1px solid rgba(0,255,255,0.08);
  border-radius: 14px;
  border-bottom-left-radius: 4px;
  align-self: flex-start;
  width: fit-content;
}
.typing-ind span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--c); opacity: 0.6;
  animation: bounce 1.2s infinite;
}
.typing-ind span:nth-child(2){animation-delay:.2s}
.typing-ind span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1);opacity:1}}

.ai-input-row {
  display: flex;
  gap: 8px;
  padding: 12px;
  border-top: 1px solid rgba(255,0,255,0.15);
  flex-shrink: 0;
  background: rgba(0,0,0,0.3);
}
.ai-input-row input {
  flex: 1;
  background: rgba(255,0,255,0.05);
  border: 1px solid rgba(255,0,255,0.2);
  border-radius: 10px;
  padding: 9px 13px;
  color: #e8d0ff;
  font-family: 'Cairo', sans-serif;
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.2s;
}
.ai-input-row input:focus { border-color: var(--m); }
.ai-input-row input::placeholder { color: rgba(200,150,255,0.3); }

.send-btn {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: linear-gradient(135deg, rgba(255,0,255,0.2), rgba(100,0,255,0.2));
  border: 1px solid rgba(255,0,255,0.3);
  color: var(--m);
  cursor: pointer;
  display: grid;
  place-items: center;
  font-size: 0.9rem;
  transition: all 0.2s;
  flex-shrink: 0;
}
.send-btn:hover { background: rgba(255,0,255,0.25); box-shadow: 0 0 15px rgba(255,0,255,0.2); }

/* ── MODEL SELECTOR ── */
.model-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  background: rgba(255,0,255,0.04);
  border-bottom: 1px solid rgba(255,0,255,0.1);
  flex-shrink: 0;
}
.model-row label { font-size: 0.65rem; color: rgba(200,150,255,0.5); font-family: 'Orbitron', monospace; white-space: nowrap; }
.model-row select {
  flex: 1;
  background: transparent;
  border: none;
  color: rgba(200,150,255,0.8);
  font-family: 'Cairo', sans-serif;
  font-size: 0.78rem;
  outline: none;
  cursor: pointer;
}
.model-row select option { background: #0a0a1a; }

/* ── FOOTER ── */
footer {
  text-align: center;
  padding: 16px;
  font-size: 0.65rem;
  color: rgba(100,160,180,0.4);
  font-family: 'Orbitron', monospace;
  letter-spacing: 2px;
}

/* ── RESPONSIVE ── */
@media(max-width:500px){
  .ai-win { width: calc(100vw - 20px); left: 10px; }
  .ip-row { flex-direction: column; }
}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="wrap">

  <!-- HEADER -->
  <div class="header">
    <div class="header-inner">
      <div class="logo-tag">// SYSTEM ONLINE v3.0</div>
      <div class="logo-main">RABI3 AI PRO</div>
      <div class="logo-sub">الذكاء الخارق · تتبع · ترجمة · محادثة</div>
      <div class="status-bar">
        <div class="status-item"><span class="pulse-dot"></span> ONLINE</div>
        <div class="status-item"><span class="pulse-dot" style="background:var(--c);box-shadow:0 0 8px var(--c)"></span> AI READY</div>
        <div class="status-item"><span class="pulse-dot" style="background:var(--m);box-shadow:0 0 8px var(--m)"></span> SECURE</div>
      </div>
      <div class="socials">
        <a href="https://www.facebook.com/HACR97" target="_blank" class="social-btn"><i class="fab fa-facebook-f"></i></a>

<script>
// ── ANIMATED BACKGROUND ──
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = (Math.random() - 0.5) * 0.3;
    this.r = Math.random() * 1.5 + 0.3;
    this.a = Math.random();
    this.c = Math.random() > 0.5 ? '0,255,255' : '255,0,255';
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset();
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${this.c},${this.a * 0.6})`;
    ctx.fill();
  }
}

for (let i = 0; i < 120; i++) particles.push(new Particle());

function drawConnections() {
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 100) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(0,255,255,${(1 - dist/100) * 0.08})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
}

function animate() {
  ctx.clearRect(0, 0, W, H);
  // Grid
  ctx.strokeStyle = 'rgba(0,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 60) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 60) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  particles.forEach(p => { p.update(); p.draw(); });
  drawConnections();
  requestAnimationFrame(animate);
}
animate();

// ── IP TRACKER ──
let map = null;

async function fetchIP(ip) {
  const res = await fetch(`https://ip-api.com/json/${ip}?fields=66846719`);
  const data = await res.json();
  if (data.status === 'fail') throw new Error('IP غير صالح');
  return data;
}

function showMap(lat, lon, city) {
  const c = document.getElementById('mapContainer');
  if (map) { map.remove(); map = null; }
  c.innerHTML = '';
  map = L.map(c).setView([lat, lon], 13);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '© OSM' }).addTo(map);
  L.circle([lat, lon], { color: '#ff0000', fillColor: '#ff0000', fillOpacity: 0.12, radius: 1200 }).addTo(map);
  L.marker([lat, lon]).addTo(map).bindPopup(`<b style="color:red">${city}</b>`).openPopup();
}

function displayIP(data) {
  const grid = document.getElementById('ipInfoGrid');
  grid.innerHTML = '';
  const fields = [
    { lbl: '🌐 IP ADDRESS', val: data.query },
    { lbl: '🌍 COUNTRY', val: data.country },
    { lbl: '🏙️ CITY', val: data.city },
    { lbl: '📍 COORDINATES', val: `${data.lat?.toFixed(4)}, ${data.lon?.toFixed(4)}` },
    { lbl: '📡 ISP', val: data.isp || 'Unknown' },
    { lbl: '🕐 TIMEZONE', val: data.timezone || 'Unknown' },
  ];
  fields.forEach(f => {
    const d = document.createElement('div');
    d.className = 'info-tile';
    d.innerHTML = `<div class="lbl">${f.lbl}</div><div class="val">${f.val}</div>`;
    grid.appendChild(d);
  });
  document.getElementById('ipResult').classList.add('show');
  showMap(data.lat, data.lon, data.city);
}

document.getElementById('scanBtn').onclick = async () => {
  const ip = document.getElementById('targetIp').value.trim();
  if (!ip) return;
  const btn = document.getElementById('scanBtn');
  btn.innerHTML = '<span>⏳ جاري...</span>';
  btn.disabled = true;
  try { const data = await fetchIP(ip); displayIP(data); }
  catch(e) { alert(e.message); }
  finally { btn.innerHTML = '<span>🔍 تتبع</span>'; btn.disabled = false; }
};

// ── TRANSLATOR ──
async function translate(text, pair) {
  const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${pair}`);
  const data = await res.json();
  return data.responseData?.translatedText || '—';
}

document.getElementById('toArabicBtn').onclick = async () => {
  const txt = document.getElementById('sourceText').value.trim();
  const div = document.getElementById('translateResult');
  if (!txt) return;
  div.innerHTML = '<span class="placeholder">⏳ جاري الترجمة...</span>';
  const r = await translate(txt, 'en|ar');
  div.innerHTML = `🇸🇦 ${r}`;
};
document.getElementById('toEnglishBtn').onclick = async () => {
  const txt = document.getElementById('sourceText').value.trim();
  const div = document.getElementById('translateResult');
  if (!txt) return;
  div.innerHTML = '<span class="placeholder">⏳ Translating...</span>';
  const r = await translate(txt, 'ar|en');
  div.innerHTML = `🇬🇧 ${r}`;
};

// ── AI CHAT ──
const aiBtn = document.getElementById('aiBtn');
const aiWin = document.getElementById('aiWindow');
const closeAi = document.getElementById('closeAi');
const aiMessages = document.getElementById('aiMessages');
const aiInput = document.getElementById('aiInput');
const sendAi = document.getElementById('sendAi');

let isWaiting = false;
let isDragging = false, dX = 0, dY = 0;

const dragHandle = document.getElementById('aiDragHandle');
dragHandle.addEventListener('mousedown', e => {
  isDragging = true;
  dX = e.clientX - aiWin.getBoundingClientRect().left;
  dY = e.clientY - aiWin.getBoundingClientRect().top;
});
document.addEventListener('mousemove', e => {
  if (!isDragging) return;
  let left = e.clientX - dX;
  let top = e.clientY - dY;
  left = Math.min(Math.max(0, left), window.innerWidth - aiWin.offsetWidth);
  top = Math.min(Math.max(0, top), window.innerHeight - aiWin.offsetHeight);
  aiWin.style.left = left + 'px'; aiWin.style.right = 'auto';
  aiWin.style.top = top + 'px'; aiWin.style.bottom = 'auto';
});
document.addEventListener('mouseup', () => isDragging = false);

aiBtn.onclick = () => { aiWin.style.display = 'flex'; };
closeAi.onclick = () => { aiWin.style.display = 'none'; };

function addMsg(text, isUser) {
  const d = document.createElement('div');
  d.className = isUser ? 'msg-user' : 'msg-ai';
  d.textContent = (isUser ? '👤 ' : '🤖 ') + text;
  aiMessages.appendChild(d);
  aiMessages.scrollTop = aiMessages.scrollHeight;
}

function showTyping() {
  const d = document.createElement('div');
  d.className = 'typing-ind'; d.id = 'typingInd';
  d.innerHTML = '<span></span><span></span><span></span>';
  aiMessages.appendChild(d);
  aiMessages.scrollTop = aiMessages.scrollHeight;
}
function hideTyping() { document.getElementById('typingInd')?.remove(); }

async function callAI(msg) {
  try {
    const model = document.getElementById('modelSelect').value;
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model,
        messages: [{ role: 'user', content: msg }],
      })
    });
    const data = await res.json();
    if (data.error) return '❌ ' + data.error;
    return data.choices[0].message.content;
  } catch(e) { return '❌ خطأ في الاتصال'; }
}

async function sendMsg() {
  const msg = aiInput.value.trim();
  if (!msg || isWaiting) return;
  addMsg(msg, true);
  aiInput.value = '';
  isWaiting = true;
  showTyping();
  const reply = await callAI(msg);
  hideTyping();
  addMsg(reply, false);
  isWaiting = false;
}

sendAi.onclick = sendMsg;
aiInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMsg(); });

console.log('%c⚡ RABI3 AI PRO — ONLINE', 'color:#0ff;font-family:monospace;font-size:14px;font-weight:bold');
</script>
